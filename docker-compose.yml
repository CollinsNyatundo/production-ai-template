services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # APP_ENV=development here is intentional for local docker-compose use
      # (enables the anonymous-admin convenience path in app/security/auth.py).
      # This is backstopped by the config-level guard in app/config.py, which
      # refuses to boot with the default JWT_SECRET for any other APP_ENV -
      # never flip this to a non-development value without also setting a
      # real JWT_SECRET below.
      - APP_ENV=development
      - JWT_SECRET=${JWT_SECRET:-local-dev-only-secret-do-not-use-in-prod}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8501,http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app.db}
      - REDIS_URL=redis://redis-cache:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama-3.1-70b-instruct}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-production-ai-template}
      - LANGSMITH_TRACING_ENABLED=${LANGSMITH_TRACING_ENABLED:-false}
    depends_on:
      - redis-cache
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://app:8000
      - FRONTEND_API_KEY=${FRONTEND_API_KEY:-api-key-admin-12345}
    depends_on:
      - app
    restart: always

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
